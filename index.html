<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>swi - 발표용공간</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- Three.js (모듈) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- ===== 로그인 ===== -->
  <div id="login" class="login">
    <div class="login-box">
      <h1>swi - 발표용공간</h1>
      <p class="login-sub">학번을 입력해 주세요</p>
      <input id="login-id" type="text" inputmode="numeric" placeholder="예: 2021147529" autocomplete="off" autocapitalize="off" spellcheck="false">
      <button id="login-btn">입장하기</button>
      <p id="login-error" class="login-error"></p>
    </div>
  </div>

  <!-- ===== 캐릭터 만들기 (인바디) ===== -->
  <div id="create" class="login">
    <div class="login-box">
      <h1>내 캐릭터 만들기</h1>
      <p class="login-sub">인바디 수치로 내 체형 캐릭터가 만들어져요</p>

      <div class="gender-row">
        <button type="button" class="gender-btn" data-gender="male">남자</button>
        <button type="button" class="gender-btn" data-gender="female">여자</button>
      </div>

      <input id="c-weight" type="number" inputmode="decimal" placeholder="체중 (kg)">
      <input id="c-bodyFat" type="number" inputmode="decimal" placeholder="체지방률 (%)">
      <input id="c-muscle" type="number" inputmode="decimal" placeholder="골격근량 (kg)">

      <button id="create-btn">입장하기</button>
      <p id="create-error" class="login-error"></p>
    </div>
  </div>

  <!-- ===== 캐릭터 미리보기 (생성 연출) ===== -->
  <div id="preview" class="login">
    <div class="preview-box">
      <h2 id="preview-title">캐릭터 생성중...</h2>
      <p id="preview-sub" class="login-sub"></p>
      <div id="preview-stage" class="preview-stage"></div>
      <button id="enter-btn">이 캐릭터로 입장하기</button>
    </div>
  </div>

  <!-- ===== 3D 공간 ===== -->
  <div id="stage" class="stage">
    <!-- Three.js 캔버스는 여기에 주입됨 -->
    <div class="space-controls">
      <div class="topbar"><span id="count">접속자 1명</span></div>

      <!-- 방향 D-패드 -->
      <div class="dpad">
        <button class="ctrl-btn" data-dir="forward" aria-label="앞으로">W</button>
        <div class="dpad-row">
          <button class="ctrl-btn" data-dir="left" aria-label="왼쪽">A</button>
          <button class="ctrl-btn" data-dir="back" aria-label="뒤로">S</button>
          <button class="ctrl-btn" data-dir="right" aria-label="오른쪽">D</button>
        </div>
      </div>

      <!-- 제스처 -->
      <div class="gestures">
        <button class="ctrl-action" id="btn-wave">👋 인사</button>
        <button class="ctrl-action" id="btn-dance">💃 춤</button>
        <button class="ctrl-action" id="btn-jump">🦘 점프</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
